name: RWA Data Collector

on:
  schedule:
    # 매일 UTC 06:00 (KST 15:00) 실행
    - cron: '0 6 * * *'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  collect-rwa-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run RWA data collector
        run: python scripts/collect_rwa_data.py

      - name: Check collected data
        run: |
          echo "=== 수집된 파일 ==="
          ls -lh data/
          echo ""
          echo "=== rwa_protocols.csv (Top 5) ==="
          head -6 data/rwa_protocols.csv
          echo ""
          echo "=== rwa_chains.csv ==="
          cat data/rwa_chains.csv
          echo ""
          echo "=== meta.json ==="
          cat data/meta.json

      - name: Commit & Push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 변경사항이 있을 때만 커밋
          git diff --staged --quiet || git commit -m "📊 RWA data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
